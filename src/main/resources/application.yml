spring:
  application:
    name: "EngTeacher"
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
  mongodb:
    uri: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@${MONGO_URL}/${MONGO_DATABASE}?authSource=admin
  threads:
    virtual:
      enabled: true